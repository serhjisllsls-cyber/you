<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Вместе</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #header {
            padding: 12px 15px;
            background: #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }
        #player-container {
            flex: 1;
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #chat {
            height: 260px;
            overflow-y: auto;
            padding: 12px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }
        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 15px;
        }
        .me { background: #3f51b5; margin-left: auto; border-bottom-right-radius: 4px; }
        .other { background: #2d2d2d; border-bottom-left-radius: 4px; }
        #controls {
            padding: 12px;
            background: #1f1f1f;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        input {
            background: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }
        .small-btn {
            padding: 10px 14px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="header">
        <div><strong>YouTube Вместе</strong></div>
        <div>Комната: <strong id="room"></strong></div>
    </div>

    <div id="player-container">
        <iframe id="youtube" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <div id="chat"></div>

    <div id="controls">
        <input type="text" id="url" placeholder="Вставь ссылку YouTube">
        <div style="display:flex; gap:8px;">
            <button onclick="loadVideo()" style="flex:1">▶ Загрузить видео</button>
            <button onclick="syncVideo()" class="small-btn">🔄 Синхр.</button>
        </div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="name" value="Я" style="width:110px;">
            <input type="text" id="msg" placeholder="Сообщение..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">→</button>
        </div>
    </div>

    <script>
        let roomId = prompt("Введите ID комнаты или оставьте пустым:") || "room" + Math.floor(Math.random() * 99999);
        document.getElementById("room").textContent = roomId;

        const iframe = document.getElementById("youtube");

        function extractVideoId(url) {
            const match = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function loadVideo() {
            const urlInput = document.getElementById("url").value.trim();
            const videoId = extractVideoId(urlInput);
            if (videoId) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
                addMessage("Система", "Видео загружено", false);
            } else {
                alert("Не удалось распознать ссылку YouTube");
            }
        }

        function sendMsg() {
            const msgInput = document.getElementById("msg");
            const name = document.getElementById("name").value.trim() || "Я";
            if (msgInput.value.trim() === "") return;
            
            addMessage(name, msgInput.value, true);
            msgInput.value = "";
        }

        function addMessage(name, text, isMe) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = `message ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<strong>${name}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function syncVideo() {
            alert("🔄 Синхронизация:\n\n1. Поставьте видео на паузу у обоих\n2. Перемотайте на одинаковое время\n3. Одновременно нажмите Play");
        }

        // Приветствие
        addMessage("Система", `Комната <b>${roomId}</b> готова!`, false);

        // Поддержка полноэкранного режима
        document.addEventListener('touchstart', () => {}, { passive: true });
    </script>
</body>
</html>
