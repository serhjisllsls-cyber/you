<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Вместе</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        #header { padding:12px; background:#111; text-align:center; }
        #player { flex:1; background:#000; }
        iframe { width:100%; height:100%; border:none; }
        #chat { height:260px; overflow-y:auto; padding:12px; background:#111; }
        .message { margin:8px 0; padding:10px 14px; border-radius:12px; max-width:85%; }
        .me { background:#3f51b5; margin-left:auto; }
        .other { background:#1f1f1f; }
        #controls { padding:12px; background:#111; }
        input, button { padding:12px; margin:5px 0; border-radius:8px; width:100%; font-size:16px; }
        button { background:#ff0000; color:white; font-weight:bold; }
    </style>
</head>
<body>
    <div id="header">YouTube Вместе — Комната: <b id="room"></b> <span id="role"></span></div>
    <div id="player"><iframe id="youtube" allowfullscreen allow="autoplay"></iframe></div>
    <div id="chat"></div>
    <div id="controls">
        <div id="hostControls">
            <input type="text" id="url" placeholder="Вставьте ссылку YouTube">
            <button onclick="loadVideo()">Запустить видео у всех</button>
        </div>

        <div style="display:flex; gap:8px; margin-top:8px;">
            <input type="text" id="name" value="Я" style="width:120px;">
            <input type="text" id="msg" placeholder="Сообщение" style="flex:1;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">→</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDUxyJ1SP5BojDMBkRBgKXFtkE8zSxHcJY",
          authDomain: "together-313cc.firebaseapp.com",
          projectId: "together-313cc",
          storageBucket: "together-313cc.firebasestorage.app",
          messagingSenderId: "547247117130",
          appId: "1:547247117130:web:acb59e4e760a71bf4167b3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = prompt("ID комнаты:") || "room" + Math.floor(Math.random()*100000);
        document.getElementById("room").textContent = roomId;

        const isHost = confirm("Вы ведущий?");
        document.getElementById("role").textContent = isHost ? "(Ведущий)" : "(Зритель)";

        if (!isHost) document.getElementById("hostControls").style.display = "none";

        const roomRef = db.ref('rooms/' + roomId);

        function loadVideo() {
            const url = document.getElementById("url").value.trim();
            const videoId = url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
            if (videoId) {
                roomRef.update({ videoId: videoId, updated: Date.now() });
            }
        }

        function sendMsg() {
            const name = document.getElementById("name").value || "Я";
            const text = document.getElementById("msg").value.trim();
            if (text) {
                roomRef.child('messages').push({ name, text, time: Date.now() });
                document.getElementById("msg").value = "";
            }
        }

        // Синхронизация видео
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.videoId) {
                const iframe = document.getElementById("youtube");
                const desiredSrc = `https://www.youtube.com/embed/${data.videoId}?autoplay=1&rel=0&playsinline=1`;
                if (iframe.src !== desiredSrc) {
                    iframe.src = desiredSrc;
                }
            }
        });

        // Сообщения
        roomRef.child('messages').on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
