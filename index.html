<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Чат">
    <title>Приватный чат</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="screen active">
            <div class="login-container">
                <h1>💬 Приватный чат</h1>
                <form id="loginForm">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Ваше имя" 
                        required
                        autocomplete="off"
                    >
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Пароль" 
                        required
                        autocomplete="off"
                    >
                    <button type="submit">Войти</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="screen">
            <div class="chat-header">
                <div class="header-content">
                    <h2 id="chatTitle">Чат</h2>
                    <span id="onlineStatus" class="online-status">•</span>
                </div>
                <button id="logoutBtn" class="logout-btn">Выход</button>
            </div>

            <div id="messagesContainer" class="messages-container">
                <!-- Сообщения будут загружаться здесь -->
            </div>

            <div class="input-area">
                <form id="messageForm">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Сообщение..."
                        autocomplete="off"
                    >
                    <button type="submit" class="send-btn">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
