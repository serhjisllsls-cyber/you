<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#260d2b">
  <title>♥</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="hearts" aria-hidden="true"></div>

  <main>
    <section class="card" aria-label="Количество дней вместе">
      <div class="days-number" id="days">0</div>
    </section>
  </main>

  <script>
    /*
      ПОМЕНЯЙ ТОЛЬКО ЭТУ ДАТУ:
      формат: ГОД-МЕСЯЦ-ДЕНЬ
    */
    const START_DATE = "2024-06-15";

    const heartsLayer = document.getElementById("hearts");
    const symbols = ["♥", "♥", "♥", "♡", "✦"];

    function getStartDate() {
      const [year, month, day] = START_DATE.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function updateCounter() {
      const startDate = getStartDate();
      const today = new Date();

      startDate.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);

      const millisecondsInDay = 1000 * 60 * 60 * 24;
      const daysTogether = Math.max(
        0,
        Math.floor((today - startDate) / millisecondsInDay)
      );

      document.getElementById("days").textContent = daysTogether;
    }

    function createHeart(x = Math.random() * 104 - 2, delay = -Math.random() * 15) {
      const heart = document.createElement("span");
      heart.className = "heart";
      heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];

      heart.style.setProperty("--x", x + "vw");
      heart.style.setProperty("--size", (7 + Math.random() * 18) + "px");
      heart.style.setProperty("--speed", (7 + Math.random() * 9) + "s");
      heart.style.setProperty("--delay", delay + "s");
      heart.style.setProperty("--hue", 325 + Math.random() * 42);
      heart.style.setProperty("--opacity", .32 + Math.random() * .62);
      heart.style.setProperty("--drift", ((Math.random() - .5) * 160) + "px");
      heart.style.setProperty("--rotate", ((Math.random() - .5) * 720) + "deg");

      heartsLayer.appendChild(heart);
      return heart;
    }

    for (let i = 0; i < 190; i++) {
      createHeart();
    }

    for (let i = 0; i < 32; i++) {
      const sparkle = document.createElement("i");
      sparkle.className = "sparkle";
      sparkle.style.left = Math.random() * 100 + "%";
      sparkle.style.top = Math.random() * 100 + "%";
      sparkle.style.opacity = .2 + Math.random() * .6;
      sparkle.style.animationDelay = -Math.random() * 2 + "s";
      heartsLayer.appendChild(sparkle);
    }

    document.addEventListener("pointerdown", (event) => {
      const x = event.clientX / window.innerWidth * 100;

      for (let i = 0; i < 16; i++) {
        const heart = createHeart(x, 0);

        heart.style.bottom = (window.innerHeight - event.clientY) + "px";
        heart.style.setProperty("--speed", (1.2 + Math.random() * 1.5) + "s");
        heart.style.setProperty("--drift", ((Math.random() - .5) * 250) + "px");

        setTimeout(() => heart.remove(), 3000);
      }
    });

    updateCounter();
  </script>
</body>
</html>
