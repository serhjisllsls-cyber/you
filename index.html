<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>YouTube Вместе</title>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg: #0a0a0a;
      --panel: #111;
      --muted: #1f1f1f;
      --accent: #ff0000;
      --accent-2: #4caf50;
      --text: #fff;
      --glass: rgba(255,255,255,0.03);
      --touch-size: 54px;
    }

    /* Mobile-first layout */
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
    .app {display:flex;flex-direction:column;height:100vh;box-sizing:border-box;}
    header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--panel);box-shadow:0 1px 0 rgba(255,255,255,0.03);gap:8px;}
    .title{font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px;}
    .subtitle{font-size:13px;color:#cfcfcf;}
    .room-badge{background:var(--glass);padding:6px 8px;border-radius:8px;font-weight:600;font-size:13px;}

    /* Player area (flex grows) */
    #player{flex:1;display:flex;align-items:stretch;position:relative;overflow:hidden;background:#000;}
    #youtube-container{width:100%;height:100%;}

    /* Floating bottom controls - big touch targets */
    .bottom-controls{
      position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom,0);display:flex;gap:8px;padding:10px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.55));
      align-items:center;box-sizing:border-box;justify-content:space-between;
      pointer-events:none;
    }
    .controls-inner{width:100%;max-width:1100px;margin:0 auto;display:flex;gap:8px;pointer-events:auto;}
    .btn{
      background:var(--accent);color:var(--text);border:none;border-radius:10px;padding:12px 14px;font-weight:700;font-size:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
      min-height:var(--touch-size);box-shadow:0 4px 14px rgba(0,0,0,0.4);
    }
    .btn.secondary{background:var(--muted);color:#ddd;}
    .btn.success{background:var(--accent-2);}

    /* Host compact controls (for mobile) */
    .host-compact{display:flex;gap:8px;align-items:center;}
    .host-panel{position:fixed;left:8px;right:8px;bottom:70px;background:linear-gradient(180deg,#141414, #0f0f0f);padding:10px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:none;flex-direction:column;gap:8px;z-index:60;}
    .host-panel.open{display:flex;}

    input[type="text"]{background:#222;border:none;color:var(--text);padding:10px;border-radius:10px;font-size:15px;outline:none;}
    .row{display:flex;gap:8px;align-items:center;}

    /* Chat drawer from bottom */
    .chat-drawer{
      position:fixed;left:0;right:0;bottom:0;height:56vh;max-height:70vh;background:var(--panel);border-top-left-radius:12px;border-top-right-radius:12px;padding:10px;box-shadow:0 -8px 30px rgba(0,0,0,0.6);transform:translateY(100%);transition:transform .28s ease;z-index:70;display:flex;flex-direction:column;
      padding-bottom:calc(env(safe-area-inset-bottom,12px) + 12px);
    }
    .chat-drawer.open{transform:translateY(0%);}

    #chat{flex:1;overflow:auto;padding:6px 2px;display:flex;flex-direction:column;gap:8px;}
    .message{max-width:85%;padding:11px 14px;border-radius:14px;font-size:15.5px;word-break:break-word;}
    .me{align-self:flex-end;background:#2b3db2;}
    .other{align-self:flex-start;background:var(--muted);}

    .chat-input{display:flex;gap:8px;margin-top:8px;}
    .chat-input input{flex:1;padding:12px;border-radius:10px;font-size:15px;}
    .chat-input button{padding:0 16px;}

    /* Top-right floating toggles */
    .top-actions{display:flex;gap:8px;align-items:center;}
    .icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px;border-radius:10px;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;}

    /* Desktop / larger screens adjustments */
    @media(min-width:900px){
      header{padding:12px 20px;}
      .host-panel{position:relative;display:flex;background:transparent;padding:0;border-radius:0;box-shadow:none;flex-direction:row;align-items:center;}
      .bottom-controls{position:relative;background:transparent;padding:12px 20px;box-shadow:none;justify-content:flex-start;}
      .chat-drawer{position:relative;transform:none;height:320px;border-radius:8px;max-height:360px;}
      .app{height:100vh;}
      #player{height:60vh;}
    }

    /* Accessibility focus */
    .btn:focus,.icon-btn:focus{outline:2px solid rgba(255,255,255,0.1);outline-offset:2px;}

  </style>
</head>
<body>
  <div class="app">
    <header>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="title">YouTube Вместе</div>
        <div class="room-badge" id="room">—</div>
        <div class="subtitle" id="role" style="margin-left:6px;"></div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="btnToggleHost" title="Панель ведущего">≡</button>
        <button class="icon-btn" id="btnToggleChat" title="Чат">💬</button>
      </div>
    </header>

    <main id="player">
      <div id="youtube-container"></div>
    </main>

    <!-- Floating bottom controls -->
    <div class="bottom-controls" aria-hidden="false">
      <div class="controls-inner">
        <div style="display:flex;gap:8px;flex:1;">
          <button id="btnPlay" class="btn success" aria-label="Запустить">▶ Запустить</button>
          <button id="btnPause" class="btn secondary" aria-label="Пауза">⏸ Пауза</button>
        </div>

        <div style="display:flex;gap:8px;align-items:center;">
          <button id="btnFull" class="btn secondary" title="Полноэкранный просмотр">⤢</button>
        </div>
      </div>
    </div>

    <!-- Compact host panel (popup on mobile) -->
    <div class="host-panel" id="hostPanel" aria-hidden="true">
      <div class="row" style="width:100%;gap:8px;">
        <input id="url" type="text" placeholder="Вставьте ссылку или ID YouTube" aria-label="URL видео" />
        <button id="btnLoad" class="btn">Загрузить</button>
      </div>
      <div class="row" style="width:100%;gap:8px;">
        <button id="btnPlayAll" class="btn success" style="flex:1;">▶ Запустить у всех</button>
        <button id="btnPauseAll" class="btn secondary" style="flex:1;">⏸ Остановить у всех</button>
      </div>
    </div>

    <!-- Chat drawer -->
    <div class="chat-drawer" id="chatDrawer" aria-hidden="true" role="dialog" aria-label="Чат">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 6px;">
        <div style="font-weight:700;">Чат</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div id="chatInfo" style="font-size:13px;color:#bbb;"></div>
          <button class="icon-btn" id="btnCloseChat" aria-label="Закрыть чат">✕</button>
        </div>
      </div>

      <div id="chat"></div>

      <div class="chat-input">
        <input id="name" type="text" value="Я" style="width:120px;" aria-label="Имя"/>
        <input id="msg" type="text" placeholder="Сообщение..." aria-label="Сообщение" />
        <button id="btnSend" class="btn" aria-label="Отправить">→</button>
      </div>
    </div>
  </div>

  <script>
    // ====== Конфигурация Firebase (не трогать, если используете свой проект) ======
    const firebaseConfig = {
      apiKey: "AIzaSyDUxyJ1SP5BojDMBkRBgKXFtkE8zSxHcJY",
      authDomain: "together-313cc.firebaseapp.com",
      projectId: "together-313cc",
      storageBucket: "together-313cc.firebasestorage.app",
      messagingSenderId: "547247117130",
      appId: "1:547247117130:web:acb59e4e760a71bf4167b3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const clientId = 'c_' + Math.random().toString(36).slice(2,11);
    const roomId = prompt("Введите ID комнаты:") || "room" + Math.floor(Math.random()*100000);
    document.getElementById("room").textContent = roomId;

    const isHost = confirm("Вы ведущий? (будете управлять видео)");
    document.getElementById("role").textContent = isHost ? "(Ведущий)" : "(Зритель)";

    // Показывать hostPanel только для ведущего
    const hostPanel = document.getElementById('hostPanel');
    const btnToggleHost = document.getElementById('btnToggleHost');
    if (!isHost) {
      btnToggleHost.style.display = 'none';
      hostPanel.style.display = 'none';
    }

    // Toggle host panel
    btnToggleHost.addEventListener('click', () => {
      hostPanel.classList.toggle('open');
      hostPanel.setAttribute('aria-hidden', !hostPanel.classList.contains('open'));
    });

    // Chat drawer toggles
    const chatDrawer = document.getElementById('chatDrawer');
    const btnToggleChat = document.getElementById('btnToggleChat');
    const btnCloseChat = document.getElementById('btnCloseChat');
    btnToggleChat.addEventListener('click', () => {
      chatDrawer.classList.add('open');
      chatDrawer.setAttribute('aria-hidden', 'false');
    });
    btnCloseChat.addEventListener('click', () => {
      chatDrawer.classList.remove('open');
      chatDrawer.setAttribute('aria-hidden', 'true');
    });

    // Bottom controls full screen
    const btnFull = document.getElementById('btnFull');
    btnFull.addEventListener('click', async () => {
      const elem = document.documentElement;
      if (!document.fullscreenElement) {
        try { await elem.requestFullscreen(); }
        catch(e){ console.warn(e); }
      } else {
        try { await document.exitFullscreen(); } catch(e) { console.warn(e); }
      }
    });

    // ====== Helpers ======
    function escapeHtml(str){
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function addMessage(name, text, mine){
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = 'message ' + (mine ? 'me' : 'other');
      div.innerHTML = `<strong>${escapeHtml(name)}:</strong> ${escapeHtml(text)}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ====== Chat logic ======
    const roomRef = db.ref('rooms/' + roomId);
    function sendMsg(){
      const name = document.getElementById('name').value.trim() || 'Пользователь';
      const text = document.getElementById('msg').value.trim();
      if (!text) return;
      const payload = { name, text, time: Date.now(), by: clientId };
      roomRef.child('messages').push(payload);
      document.getElementById('msg').value = '';
    }
    document.getElementById('btnSend').addEventListener('click', sendMsg);
    document.getElementById('msg').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

    roomRef.child('messages').on('child_added', (snap) => {
      const msg = snap.val();
      if (!msg) return;
      const mine = msg.by === clientId;
      addMessage(msg.name || 'Пользователь', msg.text || '', mine);
      // show chat drawer on mobile when new message arrives (but not spammy)
      if (!chatDrawer.classList.contains('open') && !mine) {
        // briefly flash the chat toggle button
        const btn = document.getElementById('btnToggleChat');
        btn.animate([{transform:'translateY(0)'},{transform:'translateY(-6px)'},{transform:'translateY(0)'}],{duration:420});
      }
    });

    // ====== YouTube and sync logic (kept from previous improved version) ======
    function parseYouTubeId(input){
      if (!input) return null;
      input = input.trim();
      const idOnly = input.match(/^[a-zA-Z0-9_-]{11}$/);
      if (idOnly) return idOnly[0];
      const patterns = [
        /(?:v=|\/v\/|youtu\.be\/|\/embed\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com.*(?:\/shorts\/)([a-zA-Z0-9_-]{11})/
      ];
      for (const r of patterns) {
        const m = input.match(r);
        if (m && m[1]) return m[1];
      }
      const fallback = input.match(/([a-zA-Z0-9_-]{11})/);
      return fallback ? fallback[1] : null;
    }

    let player = null;
    let playerReady = false;
    let pendingLoad = null;
    let currentVideoId = null;

    (function loadYT(){
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    })();

    function onYouTubeIframeAPIReady(){
      player = new YT.Player('youtube-container', {
        width:'100%',height:'100%',
        videoId:'',
        playerVars:{rel:0,playsinline:1,controls:1,modestbranding:1},
        events:{
          onReady: (e) => {
            playerReady = true;
            if (pendingLoad) {
              applyVideoLoad(pendingLoad.videoId, pendingLoad.start);
              pendingLoad = null;
            }
            if (isHost) startHostPositionSync();
          },
          onStateChange: onPlayerStateChange
        }
      });
    }
    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

    function applyVideoLoad(videoId, startSeconds = 0){
      if (!playerReady) {
        pendingLoad = { videoId, start: startSeconds };
        return;
      }
      try { player.loadVideoById({ videoId, startSeconds: Math.max(0, startSeconds) }); }
      catch(e) { player.cueVideoById({ videoId, startSeconds: Math.max(0, startSeconds) }); }
    }
    function applyPlay(position){
      if (!playerReady) return;
      if (typeof position === 'number') {
        const cur = player.getCurrentTime();
        if (Math.abs(cur - position) > 1.0) player.seekTo(position, true);
      }
      player.playVideo();
    }
    function applyPause(position){
      if (!playerReady) return;
      if (typeof position === 'number') {
        const cur = player.getCurrentTime();
        if (Math.abs(cur - position) > 1.0) player.seekTo(position, true);
      }
      player.pauseVideo();
    }

    // Host updates state
    function onPlayerStateChange(event){
      if (!isHost) return;
      const state = event.data;
      const now = Date.now();
      const time = player && player.getCurrentTime ? player.getCurrentTime() : 0;
      if (state === YT.PlayerState.PLAYING) {
        roomRef.child('state').set({ videoId: currentVideoId || null, playing: true, position: time, ts: now, lastBy: clientId }).catch(console.error);
      } else if (state === YT.PlayerState.PAUSED) {
        roomRef.child('state').set({ videoId: currentVideoId || null, playing: false, position: time, ts: now, lastBy: clientId }).catch(console.error);
      }
    }

    // Listen for changes
    roomRef.child('state').on('value', (snap) => {
      const s = snap.val();
      if (!s) return;
      if (s.lastBy === clientId) return; // ignore own
      if (s.videoId && s.videoId !== currentVideoId) {
        currentVideoId = s.videoId;
        applyVideoLoad(s.videoId, s.position || 0);
        setTimeout(()=>{ if (!playerReady) return; if (s.playing) applyPlay(s.position); else applyPause(s.position); },500);
        return;
      }
      if (s.videoId === currentVideoId) {
        if (!playerReady) return;
        const localPos = player.getCurrentTime ? player.getCurrentTime() : 0;
        const remotePos = typeof s.position === 'number' ? s.position : localPos;
        const diff = Math.abs(localPos - remotePos);
        if (diff > 1.0) player.seekTo(remotePos, true);
        if (s.playing) { if (player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo(); }
        else { if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo(); }
      }
    });

    // Host buttons
    document.getElementById('btnLoad').addEventListener('click', () => {
      const input = document.getElementById('url').value;
      const vid = parseYouTubeId(input);
      if (!vid) { alert('Не удалось распознать ID видео. Вставьте ссылку или сам ID (11 символов).'); return; }
      currentVideoId = vid;
      const now = Date.now();
      roomRef.child('state').set({ videoId: vid, playing: false, position: 0, ts: now, lastBy: clientId }).catch(console.error);
      applyVideoLoad(vid, 0);
    });

    // Bottom controls (also available to host & viewers, but host commands are authoritative)
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (!currentVideoId) { alert('Сначала загрузите видео.'); return; }
      const pos = playerReady && player.getCurrentTime ? player.getCurrentTime() : 0;
      roomRef.child('state').set({ videoId: currentVideoId, playing: true, position: pos, ts: Date.now(), lastBy: clientId }).catch(console.error);
      if (playerReady) player.playVideo();
    });
    document.getElementById('btnPause').addEventListener('click', () => {
      if (!currentVideoId) return;
      const pos = playerReady && player.getCurrentTime ? player.getCurrentTime() : 0;
      roomRef.child('state').set({ videoId: currentVideoId, playing: false, position: pos, ts: Date.now(), lastBy: clientId }).catch(console.error);
      if (playerReady) player.pauseVideo();
    });

    // Host "play all / pause all" (in host panel)
    document.getElementById('btnPlayAll').addEventListener('click', () => {
      if (!currentVideoId) { alert('Сначала загрузите видео.'); return; }
      const pos = playerReady && player.getCurrentTime ? player.getCurrentTime() : 0;
      roomRef.child('state').set({ videoId: currentVideoId, playing: true, position: pos, ts: Date.now(), lastBy: clientId }).catch(console.error);
      if (playerReady) player.playVideo();
    });
    document.getElementById('btnPauseAll').addEventListener('click', () => {
      if (!currentVideoId) return;
      const pos = playerReady && player.getCurrentTime ? player.getCurrentTime() : 0;
      roomRef.child('state').set({ videoId: currentVideoId, playing: false, position: pos, ts: Date.now(), lastBy: clientId }).catch(console.error);
      if (playerReady) player.pauseVideo();
    });

    // Host periodic sync
    let hostSyncInterval = null;
    function startHostPositionSync(){
      if (!isHost) return;
      if (hostSyncInterval) clearInterval(hostSyncInterval);
      hostSyncInterval = setInterval(() => {
        if (!playerReady || !currentVideoId) return;
        const pos = player.getCurrentTime ? player.getCurrentTime() : 0;
        const playing = player.getPlayerState ? (player.getPlayerState() === YT.PlayerState.PLAYING) : false;
        roomRef.child('state').update({ position: pos, playing: playing, ts: Date.now(), lastBy: clientId }).catch(console.error);
      }, 3000);
    }
    window.addEventListener('beforeunload', () => { if (hostSyncInterval) clearInterval(hostSyncInterval); });

    // Initial load of existing room state
    roomRef.child('state').once('value').then((snap) => {
      const s = snap.val();
      if (!s || !s.videoId) return;
      currentVideoId = s.videoId;
      const start = s.position || 0;
      if (playerReady) {
        applyVideoLoad(currentVideoId, start);
        setTimeout(()=>{ if (s.playing) applyPlay(start); else applyPause(start); }, 500);
      } else {
        pendingLoad = { videoId: currentVideoId, start };
      }
    }).catch(console.error);

    // initial system message
    (function sayRoomOpened(){
      const payload = { name: "Система", text: `Комната ${roomId} открыта`, time: Date.now(), by: 'system' };
      roomRef.child('messages').push(payload).catch(()=>{/*ignore*/});
    })();

    // small UX: open chat on first load for viewers
    if (!isHost) {
      setTimeout(()=>{ chatDrawer.classList.add('open'); }, 250);
    }
  </script>
</body>
</html>
