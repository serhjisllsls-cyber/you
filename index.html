<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Вместе</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        #header { padding:12px 16px; background:#111; text-align:center; border-bottom:1px solid #333; }
        #player { flex:1; background:#000; }
        iframe { width:100%; height:100%; border:none; }
        #chat { height:260px; overflow-y:auto; padding:12px; background:#111; display:flex; flex-direction:column; gap:8px; }
        .message { max-width:85%; padding:11px 14px; border-radius:14px; font-size:15.5px; }
        .me { align-self:flex-end; background:#3f51b5; border-bottom-right-radius:5px; }
        .other { align-self:flex-start; background:#1f1f1f; border-bottom-left-radius:5px; }
        #controls { padding:14px 16px; background:#111; border-top:1px solid #333; }
        input { background:#222; border:none; color:white; padding:13px; border-radius:10px; margin-bottom:8px; width:100%; font-size:16px; }
        button { background:#ff0000; color:white; border:none; padding:14px; border-radius:10px; font-size:16px; font-weight:600; width:100%; }
    </style>
</head>
<body>
    <div id="header">🎥 YouTube Вместе — Комната: <b id="room"></b></div>
    <div id="player"><iframe id="youtube" allowfullscreen allow="autoplay"></iframe></div>
    <div id="chat"></div>
    <div id="controls">
        <input type="text" id="url" placeholder="Вставьте ссылку YouTube">
        <button onclick="loadVideo()">▶ Загрузить и запустить видео</button>
        
        <div style="display:flex; gap:8px; margin-top:8px;">
            <input type="text" id="name" value="Я" style="width:130px; margin:0;">
            <input type="text" id="msg" placeholder="Сообщение..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="width:auto; padding:0 22px;">→</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDUxyJ1SP5BojDMBkRBgKXFtkE8zSxHcJY",
          authDomain: "together-313cc.firebaseapp.com",
          projectId: "together-313cc",
          storageBucket: "together-313cc.firebasestorage.app",
          messagingSenderId: "547247117130",
          appId: "1:547247117130:web:acb59e4e760a71bf4167b3",
          measurementId: "G-RXJFNZ6Y26"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = prompt("Введите ID комнаты (одинаковый для вас двоих):") || "room" + Math.floor(Math.random()*100000);
        document.getElementById("room").textContent = roomId;

        const roomRef = db.ref('rooms/' + roomId);

        // Загрузка видео (синхронизируется у обоих)
        function loadVideo() {
            const url = document.getElementById("url").value.trim();
            const videoId = url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
            if (videoId) {
                roomRef.update({
                    videoId: videoId,
                    timestamp: Date.now()
                });
            } else {
                alert("Не удалось распознать ссылку YouTube");
            }
        }

        // Отправка сообщения
        function sendMsg() {
            const name = document.getElementById("name").value.trim() || "Пользователь";
            const text = document.getElementById("msg").value.trim();
            if (text) {
                roomRef.child('messages').push({
                    name: name,
                    text: text,
                    time: Date.now()
                });
                document.getElementById("msg").value = "";
            }
        }

        // Слушаем видео
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.videoId) {
                document.getElementById("youtube").src = `https://www.youtube.com/embed/${data.videoId}?autoplay=1&rel=0&playsinline=1`;
            }
        });

        // Слушаем сообщения
        roomRef.child('messages').on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        // Приветствие
        addMessage("Система", `Комната ${roomId} открыта. Теперь оба видят сообщения и видео!`, false);

        function addMessage(name, text, isMe) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = `message ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<strong>${name}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
