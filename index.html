<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Вместе</title>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        #header { padding:12px; background:#111; text-align:center; font-size:17px; border-bottom:1px solid #333; }
        #player { flex:1; background:#000; }
        iframe { width:100%; height:100%; border:none; }
        #chat { height:280px; overflow-y:auto; padding:12px; background:#111; display:flex; flex-direction:column; gap:8px; }
        .message { max-width:85%; padding:10px 14px; border-radius:12px; font-size:15px; }
        .me { align-self:flex-end; background:#3f51b5; border-bottom-right-radius:5px; }
        .other { align-self:flex-start; background:#1f1f1f; border-bottom-left-radius:5px; }
        #controls { padding:12px; background:#111; border-top:1px solid #333; }
        input { width:100%; padding:12px; margin-bottom:8px; background:#222; border:none; color:white; border-radius:8px; font-size:16px; }
        button { width:100%; padding:14px; background:#ff0000; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold; }
    </style>
</head>
<body>
    <div id="header">YouTube Вместе — Комната: <b id="room"></b></div>
    <div id="player"><iframe id="youtube" allowfullscreen allow="autoplay"></iframe></div>
    <div id="chat"></div>
    <div id="controls">
        <input type="text" id="url" placeholder="Вставь ссылку YouTube">
        <button onclick="loadVideo()">Загрузить видео</button>
        <div style="display:flex; gap:8px; margin-top:8px;">
            <input type="text" id="name" value="Я" style="width:120px; margin:0;">
            <input type="text" id="msg" placeholder="Сообщение" style="flex:1; margin:0;" onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="width:auto; padding:0 20px;">→</button>
        </div>
    </div>

    <script>
        const roomId = prompt("Введите ID комнаты (одинаковый для обоих):") || "default123";
        document.getElementById("room").textContent = roomId;

        function extractVideoId(url) {
            return url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
        }

        function loadVideo() {
            const url = document.getElementById("url").value;
            const videoId = extractVideoId(url);
            if (videoId) {
                document.getElementById("youtube").src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                addMessage("Система", "Видео запущено", false);
            } else {
                alert("Не получилось распознать ссылку");
            }
        }

        function sendMsg() {
            const name = document.getElementById("name").value || "Пользователь";
            const text = document.getElementById("msg").value.trim();
            if (text) {
                addMessage(name, text, true);
                document.getElementById("msg").value = "";
            }
        }

        function addMessage(name, text, isMe) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = `message ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `<strong>${name}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        addMessage("Система", `Комната ${roomId} открыта. Сообщения видны только в этой вкладке.`, false);
    </script>
</body>
</html>
