<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>YouTube Вместе</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:white; font-family:Arial; height:100vh; display:flex; flex-direction:column; }
        #header { padding:12px; background:#111; text-align:center; }
        #player { flex:1; background:black; }
        iframe { width:100%; height:100%; border:none; }
        #chat { height:250px; overflow-y:auto; padding:12px; background:#111; }
        .message { margin:8px 0; padding:10px 14px; border-radius:12px; max-width:85%; }
        .me { background:#3f51b5; margin-left:auto; }
        .other { background:#222; }
        input, button { padding:12px; margin:5px; border-radius:8px; }
        button { background:#ff0000; color:white; }
    </style>
</head>
<body>
    <div id="header">YouTube Вместе — Комната: <b id="room"></b></div>
    <div id="player"><iframe id="youtube" allowfullscreen></iframe></div>
    <div id="chat"></div>
    <div style="padding:12px; background:#111;">
        <input type="text" id="url" placeholder="Ссылка YouTube" style="width:70%">
        <button onclick="loadVideo()">Загрузить</button><br><br>
        <input type="text" id="name" value="Я" style="width:100px">
        <input type="text" id="msg" placeholder="Сообщение" style="width:55%" onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Отправить</button>
    </div>

    <script>
        // Firebase config (временный)
        const firebaseConfig = {
            apiKey: "AIzaSyD5f5f5f5f5f5f5f5f5f5f5f5f5f5f5f5f5",
            authDomain: "youtube-together-grok.firebaseapp.com",
            databaseURL: "https://youtube-together-grok-default-rtdb.firebaseio.com",
            projectId: "youtube-together-grok",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const roomId = prompt("ID комнаты:") || "room" + Math.floor(Math.random()*100000);
        document.getElementById("room").textContent = roomId;

        const roomRef = db.ref('rooms/' + roomId);

        // Загрузка видео
        function loadVideo() {
            const url = document.getElementById("url").value;
            const videoId = url.match(/(?:v=|youtu\.be\/)([^&?]+)/)?.[1];
            if (videoId) {
                roomRef.update({ videoId: videoId, timestamp: Date.now() });
            }
        }

        // Отправка сообщения
        function sendMsg() {
            const name = document.getElementById("name").value || "Пользователь";
            const text = document.getElementById("msg").value;
            if (text) {
                roomRef.child('messages').push({
                    name: name,
                    text: text,
                    time: Date.now()
                });
                document.getElementById("msg").value = "";
            }
        }

        // Слушаем изменения
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.videoId) {
                document.getElementById("youtube").src = `https://www.youtube.com/embed/${data.videoId}?autoplay=1`;
            }
        });

        roomRef.child('messages').on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
